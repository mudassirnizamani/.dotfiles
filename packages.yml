# Package Dependencies for Dotfiles
# This file defines all packages needed for your dotfile configurations

# Core system packages (always installed)
core:
  - base-devel
  - git
  - stow
  - curl
  - wget
  - unzip
  - tree
  - htop
  - btop
  - neofetch

# Terminal and shell tools
terminal:
  - fish
  - zsh
  - starship
  - zoxide
  - eza
  - bat
  - ripgrep
  - fd
  - fzf
  - tmux
  - ranger
  - lf
  - nnn





# Fonts
fonts:
  - ttf-jetbrains-mono-nerd
  - ttf-fira-code
  - noto-fonts
  - noto-fonts-emoji
  - ttf-liberation
  - adobe-source-code-pro-fonts



# Optional packages (can be skipped)
optional:
  - discord
  - spotify
  - steam
  - libreoffice-fresh
  - thunderbird
  - vlc
  - transmission-gtk

# AUR packages (requires yay or paru)
